<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1080" viewBox="0 0 1800 1080" role="img" aria-labelledby="title desc">
  <title id="title">PubChem molecule filtering workflow</title>
  <desc id="desc">Publication-style workflow diagram for the pubchem-mol-filter skill, from PubChem CSV shards through user-confirmed configuration, RDKit filtering, execution, and filtered outputs.</desc>
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .title { font-family: Arial, Helvetica, sans-serif; font-size: 40px; font-weight: 700; fill: #17202a; }
      .subtitle { font-family: Arial, Helvetica, sans-serif; font-size: 21px; fill: #52616b; }
      .lane-title { font-family: Arial, Helvetica, sans-serif; font-size: 22px; font-weight: 700; fill: #17202a; }
      .box-title { font-family: Arial, Helvetica, sans-serif; font-size: 24px; font-weight: 700; fill: #17202a; }
      .box-text { font-family: Arial, Helvetica, sans-serif; font-size: 18px; fill: #2f3b45; }
      .small { font-family: Arial, Helvetica, sans-serif; font-size: 16px; fill: #42515c; }
      .tiny { font-family: Arial, Helvetica, sans-serif; font-size: 14px; fill: #52616b; }
      .tag { font-family: Arial, Helvetica, sans-serif; font-size: 15px; font-weight: 700; fill: #ffffff; }
      .box { stroke-width: 2.2; rx: 16; ry: 16; }
      .soft-shadow { filter: drop-shadow(0 8px 16px rgba(23, 32, 42, 0.10)); }
      .arrow { fill: none; stroke: #4b5b66; stroke-width: 3.2; marker-end: url(#arrowhead); }
      .arrow-muted { fill: none; stroke: #92a0aa; stroke-width: 2.4; marker-end: url(#arrowhead-muted); stroke-dasharray: 7 7; }
      .lane { fill: #f6f8fa; stroke: #d9e1e8; stroke-width: 1.5; rx: 24; ry: 24; }
      .chip { rx: 12; ry: 12; }
    </style>
    <marker id="arrowhead" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M 0 1 L 10 6 L 0 11 Z" fill="#4b5b66"/>
    </marker>
    <marker id="arrowhead-muted" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M 0 1 L 10 6 L 0 11 Z" fill="#92a0aa"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1800" height="1080"/>

  <text class="title" x="90" y="82">PubChem molecule filtering workflow</text>
  <text class="subtitle" x="90" y="118">Config-driven RDKit screening of PubChem CID/SMILES tables with resumable local or Slurm execution</text>

  <rect class="lane" x="70" y="155" width="1660" height="260"/>
  <text class="lane-title" x="100" y="198">Agent-controlled run specification</text>

  <rect class="lane" x="70" y="460" width="1660" height="430"/>
  <text class="lane-title" x="100" y="503">Molecule screening and output generation</text>

  <rect class="box soft-shadow" x="105" y="230" width="265" height="120" fill="#f7fbff" stroke="#6aa9d8"/>
  <text class="box-title" x="135" y="270">User request</text>
  <text class="box-text" x="135" y="304">Input path or shard dir</text>
  <text class="box-text" x="135" y="330">Filter intent and HPC use</text>

  <rect class="box soft-shadow" x="455" y="230" width="285" height="120" fill="#f8fff7" stroke="#65a96b"/>
  <text class="box-title" x="485" y="270">Draft configs</text>
  <text class="box-text" x="485" y="304">run_config.json</text>
  <text class="box-text" x="485" y="330">slurm_config.json if HPC</text>

  <rect class="box soft-shadow" x="825" y="230" width="285" height="120" fill="#fffaf1" stroke="#d49a3a"/>
  <text class="box-title" x="855" y="270">User approval gate</text>
  <text class="box-text" x="855" y="304">Full JSON reviewed</text>
  <text class="box-text" x="855" y="330">confirmed must be true</text>

  <rect class="box soft-shadow" x="1195" y="230" width="285" height="120" fill="#fbf7ff" stroke="#9b7bc9"/>
  <text class="box-title" x="1225" y="270">Execution mode</text>
  <text class="box-text" x="1225" y="304">Direct Python CLI</text>
  <text class="box-text" x="1225" y="330">or Kestrel Slurm job</text>

  <line class="arrow" x1="370" y1="290" x2="445" y2="290"/>
  <line class="arrow" x1="740" y1="290" x2="815" y2="290"/>
  <line class="arrow" x1="1110" y1="290" x2="1185" y2="290"/>

  <rect class="box soft-shadow" x="105" y="555" width="255" height="135" fill="#f7fbff" stroke="#6aa9d8"/>
  <text class="box-title" x="135" y="596">PubChem input</text>
  <text class="box-text" x="135" y="630">CSV or *.csv shards</text>
  <text class="box-text" x="135" y="656">CID + SMILES columns</text>

  <rect class="box soft-shadow" x="435" y="555" width="270" height="135" fill="#ffffff" stroke="#7d8b94"/>
  <text class="box-title" x="465" y="596">RDKit parsing</text>
  <text class="box-text" x="465" y="630">MolFromSmiles</text>
  <text class="box-text" x="465" y="656">Sanitization checks</text>

  <rect class="box soft-shadow" x="780" y="525" width="365" height="195" fill="#f8fff7" stroke="#65a96b"/>
  <text class="box-title" x="810" y="566">Configurable filters</text>
  <text class="box-text" x="810" y="602">Elements and composition</text>
  <text class="box-text" x="810" y="628">Heavy atoms, MW, ring size</text>
  <text class="box-text" x="810" y="654">Radicals, isotopes, zwitterions</text>
  <text class="box-text" x="810" y="680">Heteroatom lone-pair requirement</text>

  <rect class="box soft-shadow" x="1220" y="555" width="255" height="135" fill="#fffaf1" stroke="#d49a3a"/>
  <text class="box-title" x="1250" y="596">Decision</text>
  <text class="box-text" x="1250" y="630">Pass molecule</text>
  <text class="box-text" x="1250" y="656">or record rejection key</text>

  <line class="arrow" x1="360" y1="622" x2="425" y2="622"/>
  <line class="arrow" x1="705" y1="622" x2="770" y2="622"/>
  <line class="arrow" x1="1145" y1="622" x2="1210" y2="622"/>

  <rect class="box soft-shadow" x="190" y="760" width="330" height="90" fill="#f3f7fa" stroke="#8da2b3"/>
  <text class="box-title" x="220" y="796">Shard-level resume</text>
  <text class="box-text" x="220" y="828">Skip shard outputs that already exist</text>

  <rect class="box soft-shadow" x="620" y="760" width="330" height="90" fill="#f3f7fa" stroke="#8da2b3"/>
  <text class="box-title" x="650" y="796">Parallel workers</text>
  <text class="box-text" x="650" y="828">RDKit multiprocessing per shard</text>

  <rect class="box soft-shadow" x="1050" y="760" width="330" height="90" fill="#f3f7fa" stroke="#8da2b3"/>
  <text class="box-title" x="1080" y="796">Audit trail</text>
  <text class="box-text" x="1080" y="828">Resolved config and Slurm logs</text>

  <line class="arrow-muted" x1="232" y1="690" x2="305" y2="752"/>
  <line class="arrow-muted" x1="570" y1="690" x2="720" y2="752"/>
  <line class="arrow-muted" x1="1347" y1="690" x2="1215" y2="752"/>

  <rect class="box soft-shadow" x="1525" y="515" width="165" height="100" fill="#edf9f4" stroke="#3f9c72"/>
  <text class="box-title" x="1550" y="555">Passed</text>
  <text class="box-text" x="1550" y="586">CID, SMILES</text>

  <rect class="box soft-shadow" x="1525" y="660" width="165" height="100" fill="#fff3f1" stroke="#cb6a57"/>
  <text class="box-title" x="1550" y="700">Rejected</text>
  <text class="box-text" x="1550" y="731">Reason counts</text>

  <path class="arrow" d="M 1475 604 C 1500 590, 1502 575, 1515 565"/>
  <path class="arrow" d="M 1475 642 C 1500 660, 1502 690, 1515 710"/>

  <rect class="chip" x="110" y="925" width="195" height="42" fill="#6aa9d8"/>
  <text class="tag" x="134" y="952">Input data</text>
  <rect class="chip" x="335" y="925" width="230" height="42" fill="#65a96b"/>
  <text class="tag" x="359" y="952">RDKit filter logic</text>
  <rect class="chip" x="595" y="925" width="260" height="42" fill="#d49a3a"/>
  <text class="tag" x="619" y="952">Approval and execution</text>
  <rect class="chip" x="885" y="925" width="260" height="42" fill="#8da2b3"/>
  <text class="tag" x="909" y="952">Restart and auditing</text>
  <rect class="chip" x="1175" y="925" width="220" height="42" fill="#3f9c72"/>
  <text class="tag" x="1199" y="952">Filtered output</text>

  <text class="tiny" x="90" y="1028">Figure: The pubchem-mol-filter skill converts a user-approved JSON specification into a reproducible RDKit screening run. The same run config supports a single CSV or sharded PubChem tables, local execution, and Kestrel Slurm execution.</text>
</svg>
